<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAICOL2025 | PORTAL MULTIJUEGOS DEFINITIVO</title>
    <style>
        /* ============================================================
           DISEÑO NEÓN EXTREMO - OPTIMIZADO PARA SONEVIEW (2GB RAM)
           ============================================================ */
        :root { --neon: #00ff88; --neon-red: #ff0055; --dark: #050505; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding-bottom: 50px; }
        header { padding: 30px; border-bottom: 3px solid var(--neon); background: linear-gradient(180deg, #000, #0a0a0a); }
        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); font-size: 3.5em; margin: 0; letter-spacing: 5px; }
        .subtitle { font-size: 12px; color: #888; margin-top: 10px; }
        
        .status-box { margin: 20px; padding: 15px; border: 2px solid var(--neon); display: inline-block; border-radius: 50px; background: #1a1a1a; font-weight: bold; }
        
        .ad-banner { width: 90%; max-width: 728px; min-height: 90px; background: #0d0d0d; margin: 20px auto; border: 1px dashed #333; }
        
        /* CONTENEDORES DE JUEGOS */
        .grid-master { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: var(--card); border: 1px solid #333; border-radius: 10px; padding: 15px; min-width: 280px; transition: 0.3s; }
        .game-card:hover { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .game-card h2 { color: var(--neon); font-size: 1.2em; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* ELEMENTOS DE JUEGO */
        canvas { background: #000; border: 2px solid #444; }
        #dash-box { width: 100%; height: 150px; background: #000; position: relative; overflow: hidden; border: 2px solid #444; cursor: pointer; }
        #dash-player { width: 30px; height: 30px; background: var(--neon); position: absolute; bottom: 0; left: 30px; }
        .obs-dash { width: 20px; height: 40px; background: var(--neon-red); position: absolute; bottom: 0; right: -50px; }
        
        .multiplayer-zone { display: flex; gap: 10px; justify-content: center; background: #0a0a0a; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid #222; }
        
        input, button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; margin: 5px; font-family: 'Courier New', monospace; }
        button { background: var(--neon); cursor: pointer; color: #000; text-transform: uppercase; }
        button:hover { background: #fff; }
        input[type="text"] { background: #222; color: var(--neon); border: 1px solid var(--neon); }
    </style>
</head>
<body>

<header>
    <h1>MAICOL2025</h1>
    <div class="subtitle">VIVA VENEZUELA 🇻🇪 | OPTIMIZADO PARA WINDOWS 7</div>
    <div class="status-box">🎮 JUGADORES ACTIVOS: <span id="online-count">Cargando...</span></div>
</header>

<!-- ADSTERRA PUBLICIDAD -->
<div class="ad-banner">
    <script async="async" data-cfasync="false" src="https://pl29391944.profitablecpmratenetwork.com/87180b5b63568bf35f72c80e13775b10/invoke.js"></script>
    <div id="container-87180b5b63568bf35f72c80e13775b10"></div>
</div>

<div class="grid-master">
    <!-- TETRIS ONLINE P2P -->
    <div class="game-card" style="width: 100%; max-width: 600px;">
        <h2>🌐 TETRIS MULTIJUGADOR ONLINE</h2>
        <div style="margin-bottom: 10px;">
            Tu ID para invitar: <b id="my-peer-id" style="color:var(--neon)">CONECTANDO...</b><br>
            <input type="text" id="friend-id" placeholder="Pega el ID del rival">
            <button onclick="connectP2P()">RETAR AL RIVAL</button>
        </div>
        <div class="multiplayer-zone">
            <div>
                <h4 style="margin:5px; color:var(--neon)">TÚ</h4>
                <canvas id="tetris-local" width="160" height="320"></canvas>
                <div id="score-local">0</div>
            </div>
            <div>
                <h4 style="margin:5px; color:var(--neon-red)">RIVAL</h4>
                <canvas id="tetris-remote" width="160" height="320"></canvas>
                <div id="score-remote">0</div>
            </div>
        </div>
        <p style="font-size: 11px; color: #888;">Controles Online: W (Rotar), A-D (Mover), S (Bajar)</p>
    </div>

    <!-- PAINT -->
    <div class="game-card">
        <h2>🎨 PAINT COMUNITARIO</h2>
        <canvas id="paint-can" width="260" height="180" style="background:#fff; cursor:crosshair;"></canvas>
        <br>
        <input type="color" id="p-color" value="#00ff88">
        <button onclick="clearP()">BORRAR</button>
    </div>

    <!-- GEOMETRY DASH -->
    <div class="game-card">
        <h2>🟦 DASH VZLA EDITION</h2>
        <div id="dash-box" onclick="jumpD()">
            <div id="dash-player"></div>
            <div id="obs-d" class="obs-dash"></div>
        </div>
        <p>Score: <span id="dash-score">0</span></p>
        <button onclick="startD()">JUGAR DASH</button>
    </div>

    <!-- CALCULADORA -->
    <div class="game-card">
        <h2>🔢 CALC PRO</h2>
        <input type="text" id="calc-scr" style="width:90%; height:40px; background:#000; color:var(--neon); text-align:right; font-size:20px; margin-bottom:10px;" readonly>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px;">
            <button onclick="c('7')">7</button><button onclick="c('8')">8</button><button onclick="c('9')">9</button><button onclick="cL()">C</button>
            <button onclick="c('4')">4</button><button onclick="c('5')">5</button><button onclick="c('6')">6</button><button onclick="c('/')">/</button>
            <button onclick="c('1')">1</button><button onclick="c('2')">2</button><button onclick="c('3')">3</button><button onclick="c('*')">x</button>
            <button onclick="c('0')">0</button><button onclick="c('-')">-</button><button onclick="c('+')">+</button><button onclick="cE()">=</button>
        </div>
    </div>
</div>

<!-- LIBRERÍA PEERJS PARA MULTIJUGADOR -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
    console.log("Multisimulator Universe snapshot 04b29a - Easter Egg ;)");
    
    /* ================= CONTADOR REALISTA ================= */
    setInterval(() => document.getElementById('online-count').innerText = Math.floor(Math.random() * 5) + 3, 4000);
    document.getElementById('online-count').innerText = 4;

    /* ================= CALCULADORA ================= */
    function c(v){ document.getElementById('calc-scr').value += v; }
    function cL(){ document.getElementById('calc-scr').value = ''; }
    function cE(){ try { document.getElementById('calc-scr').value = eval(document.getElementById('calc-scr').value); } catch { document.getElementById('calc-scr').value = 'Error'; } }

    /* ================= PAINT ================= */
    const pc = document.getElementById('paint-can');
    const px = pc.getContext('2d');
    let pintando = false;
    pc.onmousedown = () => pintando = true;
    pc.onmouseup = () => { pintando = false; px.beginPath(); };
    pc.onmousemove = e => {
        if(!pintando) return;
        px.lineWidth = 4; px.lineCap = 'round'; px.strokeStyle = document.getElementById('p-color').value;
        const r = pc.getBoundingClientRect();
        px.lineTo(e.clientX - r.left, e.clientY - r.top); px.stroke();
        px.beginPath(); px.moveTo(e.clientX - r.left, e.clientY - r.top);
    };
    function clearP() { px.clearRect(0,0,pc.width,pc.height); }

    /* ================= GEOMETRY DASH ================= */
    let dPts = 0;
    function jumpD() {
        let p = document.getElementById('dash-player');
        if(p.style.bottom === '60px') return;
        p.style.transition = 'bottom 0.3s'; p.style.bottom = '60px';
        setTimeout(() => p.style.bottom = '0px', 300);
    }
    function startD() {
        let obs = document.getElementById('obs-d'); let x = 0; dPts = 0;
        setInterval(() => {
            x += 5; if(x > 320) { x = 0; dPts++; document.getElementById('dash-score').innerText = dPts; }
            obs.style.right = x + 'px';
        }, 20);
    }

    /* ================= TETRIS MULTIPLAYER (PEERJS) ================= */
    const peer = new Peer('maicol-pro-' + Math.floor(Math.random()*9999));
    let conexion;
    peer.on('open', id => document.getElementById('my-peer-id').innerText = id);
    
    function connectP2P() {
        const friend = document.getElementById('friend-id').value;
        conexion = peer.connect(friend);
        configurarChat();
    }
    peer.on('connection', c => { conexion = c; configurarChat(); });
    
    function configurarChat() {
        conexion.on('data', d => {
            if(d.t === 'grid') renderizar(ctxRem, d.m, d.p, d.a);
            if(d.t === 'pts') document.getElementById('score-remote').innerText = d.v;
        });
    }

    /* MOTOR TETRIS */
    const cvLoc = document.getElementById('tetris-local');
    const ctxLoc = cvLoc.getContext('2d');
    const cvRem = document.getElementById('tetris-remote');
    const ctxRem = cvRem.getContext('2d');
    ctxLoc.scale(16, 16); ctxRem.scale(16, 16); // Escala para lienzo de 160x320 (10x20 bloques)

    function pieza(t) {
        if(t==='I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if(t==='L') return [[0,2,0],[0,2,0],[0,2,2]];
        if(t==='O') return [[3,3],[3,3]];
        if(t==='T') return [[0,4,0],[4,4,4],[0,0,0]];
        return [[0,5,5],[5,5,0],[0,0,0]];
    }

    const arena = Array.from({length: 20}, () => new Array(10).fill(0));
    const jug = { p: {x: 3, y: 0}, m: pieza('T'), pts: 0 };

    function renderizar(ctx, m, p, a) {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,10,20);
        dibujarM(ctx, a, {x:0, y:0}); dibujarM(ctx, m, p);
    }

    function dibujarM(ctx, m, o) {
        m.forEach((r, y) => { r.forEach((v, x) => {
            if(v !== 0) {
                ctx.fillStyle = ['#0f8','#f05','#82e','#0ff','#ff0'][v-1];
                ctx.fillRect(x + o.x, y + o.y, 1, 1);
            }
        });});
    }

    function choca(a, p) {
        const [m, o] = [p.m, p.p];
        for(let y=0; y<m.length; ++y) {
            for(let x=0; x<m[y].length; ++x) {
                if(m[y][x] !== 0 && (a[y+o.y] && a[y+o.y][x+o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function bajar() {
        jug.p.y++;
        if(choca(arena, jug)) {
            jug.p.y--;
            jug.m.forEach((r, y) => r.forEach((v, x) => { if(v!==0) arena[y+jug.p.y][x+jug.p.x] = v; }));
            reiniciarJ(); limpiarA();
        }
        if(conexion) conexion.send({t:'grid', m:jug.m, p:jug.p, a:arena});
    }

    function rotar() {
        const m = jug.m;
        for(let y=0; y<m.length; ++y) for(let x=0; x<y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
        m.forEach(r => r.reverse());
    }

    function reiniciarJ() {
        const pzs = 'ILOTS'; jug.m = pieza(pzs[Math.floor(Math.random()*pzs.length)]);
        jug.p.y = 0; jug.p.x = 3;
        if(choca(arena, jug)) arena.forEach(r => r.fill(0));
    }

    function limpiarA() {
        for(let y = arena.length-1; y > 0; --y) {
            if(!arena[y].includes(0)) {
                arena.splice(y, 1); arena.unshift(new Array(10).fill(0));
                jug.pts += 10; document.getElementById('score-local').innerText = jug.pts;
                if(conexion) conexion.send({t:'pts', v:jug.pts});
            }
        }
    }

    document.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if(k === 'a') jug.p.x--;
        if(k === 'd') jug.p.x++;
        if(k === 's') bajar();
        if(k === 'w') { rotar(); if(choca(arena, jug)) { rotar(); rotar(); rotar(); } } // revierte si choca
        if(choca(arena, jug) && (k==='a'||k==='d')) k==='a' ? jug.p.x++ : jug.p.x--; // revierte horizontal
        if(conexion && conexion.open) conexion.send({t:'grid', m:jug.m, p:jug.p, a:arena});
    });

    setInterval(bajar, 900);
    setInterval(() => renderizar(ctxLoc, jug.m, jug.p, arena), 50);
    reiniciarJ();

</script>
</body>
</html>
